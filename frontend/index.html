<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
    <title>Vite + React + TS</title>
    <script>
      (function () {
        var legacyPrefix = '/garden'
        var pathname = window.location.pathname || '/'
        if (pathname === legacyPrefix || pathname.indexOf(legacyPrefix + '/') === 0) {
          var nextPath = pathname.slice(legacyPrefix.length) || '/'
          if (nextPath.charAt(0) !== '/') {
            nextPath = '/' + nextPath
          }
          window.history.replaceState(window.history.state, '', nextPath + window.location.search + window.location.hash)
        }
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
